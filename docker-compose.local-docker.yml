services:
  notify:
    image: cloud-dog/notification-agent-mcp-server:latest
    container_name: notify-all
    network_mode: host
    environment:
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_TOKEN=${VAULT_TOKEN}
      - VAULT_MOUNT_POINT=${VAULT_MOUNT_POINT}
      - VAULT_CONFIG_PATH=${VAULT_CONFIG_PATH}
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
      - ./cache:/app/cache
      - ./storage:/app/storage
      - ${ENV_FILE}:/app/env:ro
    command: all
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${CLOUD_DOG__NOTIFY__API_SERVER__PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
